<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#faf8f5" id="theme-color-meta">
<title>ВысшМат — Портал</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════
   TOKENS
═══════════════════════════════════════ */
:root {
  --bg:           #faf8f5;
  --bg2:          #f0ebe3;
  --bg3:          #e8e0d4;
  --card:         #f0ebe3;
  --text:         #1a1208;
  --text2:        #4a3c28;
  --muted:        #7a6a52;
  --accent:       #c0392b;
  --accent-d:     #a93226;
  --accent-bg:    rgba(192,57,43,0.09);
  --border:       #e0d8cc;
  --border2:      #d0c8bc;
  --sidebar-bg:   #f5f0e8;
  --shadow:       rgba(0,0,0,0.08);
  --shadow-lg:    rgba(0,0,0,0.16);
  --success:      #27ae60;
  --warn-bg:      #fef9e7;
  --def-bg:       #eef3fc;
  --thm-bg:       #fdf3f0;
  --formula-bg:   #f8f6f2;
  --nb-height:    56px;   /* bottom nav height */
  --topbar-h:     52px;
  --safe-bottom:  env(safe-area-inset-bottom, 0px);
}
[data-theme="dark"] {
  --bg:           #13121a;
  --bg2:          #1e1e2e;
  --bg3:          #252538;
  --card:         #1e1e2e;
  --text:         #e8e3d8;
  --text2:        #c8bfa8;
  --muted:        #8a8070;
  --accent:       #e05a4e;
  --accent-d:     #c94a3e;
  --accent-bg:    rgba(224,90,78,0.11);
  --border:       #2e2c3a;
  --border2:      #3a3848;
  --sidebar-bg:   #181825;
  --shadow:       rgba(0,0,0,0.3);
  --shadow-lg:    rgba(0,0,0,0.5);
  --success:      #58d68d;
  --warn-bg:      #2a2010;
  --def-bg:       #1a2540;
  --thm-bg:       #2a1a10;
  --formula-bg:   #16162a;
}

/* ═══════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html {
  background: var(--bg);
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
  scroll-behavior: smooth;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  line-height: 1.6;
  overflow-x: hidden;
  transition: background 0.2s, color 0.2s;
  /* Prevent pull-to-refresh on mobile */
  overscroll-behavior-y: contain;
}

/* ═══════════════════════════════════════
   LAYOUT SHELL
═══════════════════════════════════════ */
.app-root {
  display: flex;
  min-height: 100vh;
  min-height: 100dvh;
}

/* ── Desktop sidebar ── */
.sidebar {
  width: 288px;
  height: 100vh;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 200;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: transform 0.28s cubic-bezier(0.4,0,0.2,1), box-shadow 0.28s;
}

.sidebar-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.46);
  z-index: 199;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.28s;
  backdrop-filter: blur(2px);
}
.sidebar-overlay.show { opacity: 1; pointer-events: all; }

/* ── Main wrapper ── */
.main-wrapper {
  flex: 1;
  margin-left: 288px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ═══════════════════════════════════════
   RESPONSIVE BREAKPOINTS
═══════════════════════════════════════ */
@media (max-width: 900px) {
  .sidebar {
    transform: translateX(-100%);
    box-shadow: none;
  }
  .sidebar.open {
    transform: translateX(0);
    box-shadow: 4px 0 32px var(--shadow-lg);
  }
  .main-wrapper {
    margin-left: 0;
    padding-bottom: calc(var(--nb-height) + var(--safe-bottom));
  }
}

/* ═══════════════════════════════════════
   SIDEBAR INTERIOR
═══════════════════════════════════════ */
.sb-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 18px 18px 14px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  user-select: none;
}
.sb-logo-sym { font-size: 26px; color: var(--accent); font-weight: 900; line-height: 1; }
.sb-logo-name {
  font-family: 'Playfair Display', serif;
  font-size: 17px; font-weight: 700;
  color: var(--text); letter-spacing: -0.01em;
}
.sb-close {
  margin-left: auto;
  background: none; border: none;
  font-size: 20px; color: var(--muted);
  cursor: pointer; padding: 4px;
  border-radius: 6px;
  display: none;
}
@media (max-width: 900px) { .sb-close { display: block; } }

.sb-search {
  position: relative;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sb-search input {
  width: 100%; padding: 9px 36px 9px 14px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text);
  font-size: 14px; font-family: inherit; outline: none;
  transition: border-color 0.15s;
}
.sb-search input:focus { border-color: var(--accent); }
.sb-search-icon {
  position: absolute; right: 24px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted); font-size: 17px; pointer-events: none;
}

.sb-nav { flex: 1; overflow-y: auto; padding: 6px 0 12px; overscroll-behavior: contain; }
.sb-nav::-webkit-scrollbar { width: 4px; }
.sb-nav::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.sb-home {
  display: flex; align-items: center; gap: 9px;
  padding: 11px 18px; cursor: pointer;
  font-size: 14px; font-weight: 600;
  color: var(--muted); border-radius: 0 8px 8px 0;
  margin: 0 10px 6px 0;
  transition: all 0.15s;
}
.sb-home:hover, .sb-home.active { color: var(--accent); background: var(--accent-bg); }

.sb-section { margin-bottom: 2px; }
.sb-section-hd {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px; cursor: pointer;
  font-size: 10.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--muted); transition: color 0.15s;
  user-select: none;
}
.sb-section-hd:hover { color: var(--accent); }
.sb-sec-icon { font-size: 14px; }
.sb-sec-label { flex: 1; }
.sb-sec-arr { font-size: 11px; transition: transform 0.2s; display: inline-block; }
.sb-sec-arr.c { transform: rotate(-90deg); }
.sb-sec-prog {
  font-size: 10px; background: var(--bg2);
  padding: 1px 6px; border-radius: 9px; font-weight: 600;
}

.sb-items { padding: 1px 0 4px; }
.sb-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 7px 14px 7px 22px; cursor: pointer;
  font-size: 13px; color: var(--muted);
  transition: all 0.13s; line-height: 1.35;
  min-height: 40px;
}
.sb-item:active { background: var(--accent-bg); }
.sb-item:hover { color: var(--text2); background: var(--bg2); }
.sb-item.active {
  color: var(--accent); background: var(--accent-bg);
  font-weight: 600; border-left: 3px solid var(--accent);
  padding-left: 19px;
}
.sb-item.done .sb-item-title { text-decoration: line-through; color: var(--muted); opacity: 0.7; }
.sb-done-dot { color: var(--success); font-size: 11px; font-weight: 700; min-width: 18px; padding-top: 1px; }
.sb-item-num { min-width: 22px; color: var(--muted); font-size: 11.5px; padding-top: 1px; flex-shrink: 0; }
.sb-item-title { flex: 1; }

.sb-footer {
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.sb-prog-label { font-size: 12px; color: var(--muted); margin-bottom: 5px; }
.sb-prog-bar { height: 4px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
.sb-prog-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s; }

/* ═══════════════════════════════════════
   TOP BAR
═══════════════════════════════════════ */
.topbar {
  position: sticky; top: 0; z-index: 100;
  height: var(--topbar-h);
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 0 16px 0 12px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  transition: background 0.2s;
  gap: 8px;
}

.topbar-left { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
.topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

.menu-btn {
  display: none;
  background: none; border: none;
  width: 38px; height: 38px;
  border-radius: 10px;
  font-size: 20px; cursor: pointer;
  color: var(--muted);
  align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}
.menu-btn:active { background: var(--bg2); }
@media (max-width: 900px) { .menu-btn { display: flex; } }

.breadcrumb {
  display: flex; align-items: center;
  gap: 6px; min-width: 0;
  font-size: 14px;
}
.bc-home {
  color: var(--muted); cursor: pointer;
  white-space: nowrap;
  transition: color 0.13s;
}
.bc-home:hover { color: var(--accent); }
.bc-sep { color: var(--border2); font-size: 16px; flex-shrink: 0; }
.bc-topic {
  color: var(--text); font-weight: 600;
  white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; min-width: 0;
  font-size: 13.5px;
}

/* ring progress */
.ring-wrap { position: relative; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.ring-bg-c { stroke: var(--border); }
.ring-fill-c { stroke: var(--accent); transition: stroke-dasharray 0.4s; }
.ring-pct { position: absolute; font-size: 8.5px; font-weight: 700; color: var(--text); }

.icon-btn {
  background: none; border: 1px solid var(--border);
  border-radius: 9px; padding: 0;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; cursor: pointer;
  transition: all 0.15s; color: var(--text);
  flex-shrink: 0;
}
.icon-btn:hover { border-color: var(--accent); background: var(--accent-bg); }
.icon-btn:active { transform: scale(0.94); }

/* ═══════════════════════════════════════
   BOTTOM NAV (mobile only)
═══════════════════════════════════════ */
.bottom-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 150;
  background: var(--bg);
  border-top: 1px solid var(--border);
  height: calc(var(--nb-height) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  align-items: stretch;
  box-shadow: 0 -4px 20px var(--shadow);
}
@media (max-width: 900px) { .bottom-nav { display: flex; } }

.bn-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px; cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
  padding: 6px 4px 0;
  position: relative;
  border: none; background: none;
  color: var(--muted); font-family: inherit;
  font-size: 10px; font-weight: 500;
}
.bn-item.active { color: var(--accent); }
.bn-item:active { transform: scale(0.92); }
.bn-icon { font-size: 22px; line-height: 1; }
.bn-label { font-size: 10px; font-weight: 500; }
.bn-badge {
  position: absolute; top: 4px; right: calc(50% - 16px);
  background: var(--accent); color: white;
  font-size: 9px; font-weight: 700;
  padding: 1px 5px; border-radius: 8px;
  min-width: 16px; text-align: center;
}

/* ═══════════════════════════════════════
   MAIN CONTENT
═══════════════════════════════════════ */
.main-content {
  flex: 1;
  max-width: 820px; width: 100%;
  margin: 0 auto;
  padding: 28px 24px 60px;
}
@media (max-width: 600px) {
  .main-content { padding: 16px 14px 24px; }
}

/* ═══════════════════════════════════════
   HOME PAGE
═══════════════════════════════════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fadeUp 0.28s ease; }

/* Hero */
.hero {
  text-align: center;
  padding: 40px 0 36px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 40px;
}
@media (max-width: 600px) {
  .hero { padding: 28px 0 24px; margin-bottom: 28px; }
}
.hero-badge {
  display: inline-block;
  background: var(--accent-bg); color: var(--accent);
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.09em;
  padding: 4px 12px; border-radius: 20px; margin-bottom: 16px;
}
.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(28px, 7vw, 52px);
  font-weight: 700; line-height: 1.13;
  margin: 0 0 12px; color: var(--text);
}
.hero-accent { color: var(--accent); }
.hero-sub {
  font-size: clamp(14px, 3.5vw, 16px);
  color: var(--muted); max-width: 500px;
  margin: 0 auto 28px; line-height: 1.6;
}
.hero-stats {
  display: flex; justify-content: center;
  gap: clamp(16px, 5vw, 40px); margin-bottom: 28px; flex-wrap: wrap;
}
.stat-num {
  display: block;
  font-family: 'Playfair Display', serif;
  font-size: clamp(28px, 7vw, 36px);
  font-weight: 700; color: var(--accent); line-height: 1;
}
.stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
.hero-cta {
  background: var(--accent); color: white; border: none;
  padding: 13px 28px; border-radius: 11px;
  font-size: 15px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  transition: all 0.2s; letter-spacing: 0.01em;
  width: clamp(200px, 60vw, 260px);
}
.hero-cta:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 8px 20px var(--shadow-lg); }
.hero-cta:active { transform: scale(0.97); }

/* Section heading */
.sec-hd {
  font-family: 'Playfair Display', serif;
  font-size: clamp(20px, 5vw, 26px);
  font-weight: 700; margin: 0 0 18px; color: var(--text);
}
.home-sec { margin-bottom: 40px; }

/* Sections grid */
.sections-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
  gap: 12px;
}
@media (max-width: 400px) {
  .sections-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
}
.sec-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 12px 13px;
  cursor: pointer; transition: all 0.18s;
  -webkit-tap-highlight-color: transparent;
}
.sec-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow-lg); }
.sec-card:active { transform: scale(0.97); }
.sc-icon { font-size: 24px; margin-bottom: 7px; }
.sc-name { font-weight: 700; font-size: 12.5px; color: var(--text); line-height: 1.3; margin-bottom: 3px; }
.sc-cnt { font-size: 11px; color: var(--muted); margin-bottom: 9px; }
.sc-bar { height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
.sc-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s; }
.sc-pct { font-size: 10.5px; color: var(--muted); text-align: right; }

/* Topics list */
.topics-list { display: flex; flex-direction: column; gap: 7px; }
.topic-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; cursor: pointer; transition: all 0.14s;
  -webkit-tap-highlight-color: transparent;
}
.topic-row:hover { border-color: var(--accent); background: var(--accent-bg); }
.topic-row:active { transform: scale(0.99); }
.topic-row.done { opacity: 0.58; }
.tr-num {
  min-width: 28px; height: 28px;
  background: var(--accent); color: white;
  border-radius: 7px; display: flex; align-items: center;
  justify-content: center; font-size: 11.5px; font-weight: 700;
  flex-shrink: 0;
}
.topic-row.done .tr-num { background: var(--success); }
.tr-body { flex: 1; min-width: 0; }
.tr-title { font-weight: 600; font-size: 13.5px; color: var(--text); line-height: 1.3; }
.tr-sub { font-size: 11.5px; color: var(--muted); margin-top: 1px; line-height: 1.3; }
.tr-check { color: var(--success); font-size: 17px; font-weight: 700; flex-shrink: 0; }

/* ═══════════════════════════════════════
   TOPIC PAGE
═══════════════════════════════════════ */
.topic-hd {
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}
.topic-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
.topic-num-badge {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted);
}
.topic-done-pill {
  background: #d5f5e3; color: #1e8449;
  font-size: 11px; font-weight: 700;
  padding: 3px 9px; border-radius: 10px;
}
[data-theme="dark"] .topic-done-pill { background: #1a3a28; color: #58d68d; }
.topic-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(20px, 5vw, 32px);
  font-weight: 700; margin: 0 0 8px;
  line-height: 1.2; color: var(--text);
}
.topic-subtitle {
  font-size: clamp(13.5px, 3.5vw, 15px);
  color: var(--muted); line-height: 1.55;
}

/* Collapsible */
.coll { margin-bottom: 14px; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.coll-btn {
  width: 100%; display: flex; align-items: center; gap: 9px;
  padding: 13px 16px; background: var(--bg2);
  border: none; cursor: pointer; text-align: left;
  color: var(--text); font-size: 14.5px; font-weight: 700;
  font-family: inherit; transition: background 0.13s;
  -webkit-tap-highlight-color: transparent;
}
.coll-btn:hover { background: var(--accent-bg); }
.coll-btn:active { background: var(--accent-bg); }
.coll-icon { font-size: 16px; }
.coll-title { flex: 1; }
.coll-arr { font-size: 13px; color: var(--muted); transition: transform 0.2s; display: inline-block; }
.coll-arr.open { transform: rotate(0deg); }
.coll-arr.closed { transform: rotate(-90deg); }
.coll-body { padding: 16px; }
@media (max-width: 600px) { .coll-body { padding: 14px 12px; } }

/* Theory */
.theory-stack { display: flex; flex-direction: column; gap: 12px; }
.theory-p { font-size: 15px; line-height: 1.75; color: var(--text); }
.t-def {
  background: var(--def-bg); border-left: 3px solid #3498db;
  border-radius: 0 8px 8px 0; padding: 11px 14px;
}
.t-thm {
  background: var(--thm-bg); border-left: 3px solid var(--accent);
  border-radius: 0 8px 8px 0; padding: 11px 14px;
}
.t-def p, .t-thm p { margin: 0; font-size: 14.5px; line-height: 1.7; }
.t-label {
  display: inline-block; color: white;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.05em;
  padding: 2px 7px; border-radius: 4px; margin-bottom: 7px;
}
.t-label.def { background: #3498db; }
.t-label.thm { background: var(--accent); }

/* Formulas */
.formulas-stack { display: flex; flex-direction: column; gap: 10px; }
.f-card {
  position: relative; background: var(--formula-bg);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 16px; text-align: center;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.f-card.key { border-color: var(--accent); background: var(--accent-bg); }
.f-key-badge {
  position: absolute; top: 7px; right: 7px;
  background: var(--accent); color: white;
  font-size: 9px; font-weight: 700;
  text-transform: uppercase; padding: 2px 7px; border-radius: 7px;
}
.f-label { font-size: 11.5px; color: var(--muted); margin-bottom: 9px; font-weight: 500; }
.math-display { display: block; font-size: clamp(14px, 4vw, 17px); }

/* Key ideas */

.idea-card {

}
.idea-icon { font-size: 20px; margin-bottom: 7px; }
.idea-title { font-weight: 700; font-size: 12.5px; margin-bottom: 5px; color: var(--text); }
.idea-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }

/* Examples */
.examples-stack { display: flex; flex-direction: column; gap: 16px; }
.ex-block {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
}
.ex-hd {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 11px 14px;
  background: var(--accent-bg); border-bottom: 1px solid var(--border);
}
.ex-badge {
  background: var(--accent); color: white;
  font-size: 10.5px; font-weight: 700;
  padding: 3px 9px; border-radius: 7px;
  white-space: nowrap; flex-shrink: 0;
}
.ex-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; padding-top: 2px; }
.ex-steps { padding: 12px 14px; display: flex; flex-direction: column; gap: 9px; }
.ex-step { display: flex; gap: 10px; align-items: flex-start; }
.step-num {
  min-width: 20px; height: 20px;
  background: var(--accent); color: white;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; margin-top: 3px; flex-shrink: 0;
}
.step-body { flex: 1; font-size: 14px; line-height: 1.7; color: var(--text); overflow-x: auto; }
.ex-result {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; background: #d5f5e3;
  border-top: 1px solid var(--border);
}
[data-theme="dark"] .ex-result { background: #1a3a28; }
.result-label { font-size: 12.5px; font-weight: 700; color: var(--success); white-space: nowrap; }

/* Warnings */
.warn-list { display: flex; flex-direction: column; gap: 9px; list-style: none; }
.warn-item {
  display: flex; gap: 9px; align-items: flex-start;
  background: var(--warn-bg); border-left: 3px solid #f39c12;
  border-radius: 0 8px 8px 0; padding: 9px 12px;
  font-size: 13.5px; color: var(--text); line-height: 1.55;
}
.warn-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }

/* Done button */
.topic-actions { display: flex; justify-content: center; margin: 28px 0 22px; }
.done-btn {
  padding: 12px 28px;
  background: var(--bg2); border: 2px solid var(--border);
  border-radius: 11px; font-size: 14.5px; font-weight: 600;
  cursor: pointer; color: var(--text); font-family: inherit;
  transition: all 0.18s;
  min-width: 220px;
}
.done-btn:hover { border-color: var(--accent); color: var(--accent); }
.done-btn:active { transform: scale(0.97); }
.done-btn.done { background: #d5f5e3; border-color: var(--success); color: var(--success); }
[data-theme="dark"] .done-btn.done { background: #1a3a28; border-color: #58d68d; color: #58d68d; }

/* Prev/next nav */
.topic-nav {
  display: flex; justify-content: space-between;
  gap: 12px; padding-top: 24px;
  border-top: 1px solid var(--border);
}
.nav-side { flex: 1; }
.nav-side.right { text-align: right; }
.nav-btn {
  display: inline-flex; flex-direction: column;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 14px;
  cursor: pointer; font-family: inherit;
  color: var(--muted); transition: all 0.14s;
  max-width: 220px; text-align: left;
  font-size: 12.5px;
}
.nav-side.right .nav-btn { text-align: right; }
.nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.nav-btn:active { transform: scale(0.97); }
.nav-btn-label { font-weight: 600; color: var(--text); font-size: 12px; display: block; margin-top: 2px; }

/* KaTeX */
.katex-display { overflow-x: auto; overflow-y: hidden; padding: 2px 0; }
.katex { font-size: 1em; }

/* ═══════════════════════════════════════
   MOBILE TOPIC NAV SWIPE HINT
═══════════════════════════════════════ */
.swipe-hint {
  display: none;
  text-align: center;
  font-size: 11px; color: var(--muted);
  padding: 8px 0 0;
}
@media (max-width: 600px) { .swipe-hint { display: block; } }

/* ═══════════════════════════════════════
   SEARCH NO-RESULTS
═══════════════════════════════════════ */
.no-results { padding: 14px 18px; color: var(--muted); font-size: 13px; }

/* ═══════════════════════════════════════
   EMPTY / ERROR
═══════════════════════════════════════ */
.err-page {
  padding: 60px 20px; text-align: center;
  color: var(--muted); font-size: 16px;
}

/* ═══════════════════════════════════════
   SELECTION
═══════════════════════════════════════ */
::selection { background: var(--accent-bg); color: var(--accent); }
</style>
</head>
<body>
<div id="root"></div>
<script src="topics-data.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ──────────────────────────────────────
   KaTeX renderer
────────────────────────────────────── */
function KM({ tex, display = false }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    const go = () => {
      if (!window.katex || !ref.current) return;
      try { window.katex.render(tex || '', ref.current, { displayMode: display, throwOnError: false, strict: false }); }
      catch { if (ref.current) ref.current.textContent = tex; }
    };
    if (window.katex) go();
    else {
      const iv = setInterval(() => { if (window.katex) { go(); clearInterval(iv); } }, 80);
      return () => clearInterval(iv);
    }
  }, [tex, display]);
  return <span ref={ref} className={display ? 'math-display' : 'math-inline'} />;
}

/* ──────────────────────────────────────
   Rich text: parses $...$ and $$...$$
────────────────────────────────────── */
function RT({ text }) {
  if (!text) return null;
  const parts = [];
  let k = 0;
  text.split(/((?:\$\$)[\s\S]*?(?:\$\$))/).forEach(chunk => {
    if (chunk.startsWith('$$') && chunk.endsWith('$$') && chunk.length > 4) {
      parts.push(<span key={k++} style={{display:'block',textAlign:'center',margin:'10px 0',overflowX:'auto'}}><KM tex={chunk.slice(2,-2)} display /></span>);
    } else {
      chunk.split(/(\$[^$\n]+?\$)/).forEach(p => {
        if (p.startsWith('$') && p.endsWith('$') && p.length > 2)
          parts.push(<KM key={k++} tex={p.slice(1,-1)} />);
        else if (p) parts.push(<span key={k++}>{p}</span>);
      });
    }
  });
  return <>{parts}</>;
}

/* ──────────────────────────────────────
   Collapsible
────────────────────────────────────── */
function Coll({ title, icon, children, open: initOpen = true }) {
  const [open, setOpen] = useState(initOpen);
  return (
    <div className="coll">
      <button className="coll-btn" onClick={() => setOpen(v => !v)}>
        <span className="coll-icon">{icon}</span>
        <span className="coll-title">{title}</span>
        <span className={`coll-arr ${open ? 'open' : 'closed'}`}>▾</span>
      </button>
      {open && <div className="coll-body">{children}</div>}
    </div>
  );
}

/* ──────────────────────────────────────
   Theory block
────────────────────────────────────── */
function TBlock({ b }) {
  const type = b.type;
  if (type === 'def' || type === 'definition') return (
    <div className="t-def">
      <span className="t-label def">{b.label || 'Определение'}</span>
      <p><RT text={b.text} /></p>
    </div>
  );
  if (type === 'theorem') return (
    <div className="t-thm">
      <span className="t-label thm">{b.label || 'Теорема'}</span>
      <p><RT text={b.text} /></p>
    </div>
  );
  return <p className="theory-p"><RT text={b.text} /></p>;
}

/* ──────────────────────────────────────
   Example
────────────────────────────────────── */
function Ex({ ex, num }) {
  return (
    <div className="ex-block">
      <div className="ex-hd">
        <span className="ex-badge">Пример {num}</span>
        <span className="ex-title"><RT text={ex.title} /></span>
      </div>
      <div className="ex-steps">
        {ex.steps.map((step, i) => {
          const txt = typeof step === 'string' ? step : step.text;
          const res = typeof step === 'string' ? null : step.result;
          return (
            <div key={i}>
              <div className="ex-step">
                <span className="step-num">{i+1}</span>
                <div className="step-body"><RT text={txt} /></div>
              </div>
              {res && (
                <div className="ex-result">
                  <span className="result-label">Ответ:</span>
                  <div style={{flex:1,overflowX:'auto'}}><RT text={res} /></div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ──────────────────────────────────────
   Sidebar
────────────────────────────────────── */
function Sidebar({ cur, nav, done, open, setOpen }) {
  const [q, setQ] = useState('');
  const [coll, setColl] = useState({});
  const SECTIONS = window.SECTIONS;
  const TOPICS   = window.TOPICS;

  const toggle = id => setColl(p => ({...p, [id]: !p[id]}));
  const filtered = q.trim()
    ? TOPICS.filter(t => t.title.toLowerCase().includes(q.toLowerCase()))
    : null;

  // swipe to close
  const startX = useRef(null);
  const onTouchStart = e => { startX.current = e.touches[0].clientX; };
  const onTouchEnd = e => {
    if (startX.current === null) return;
    const dx = e.changedTouches[0].clientX - startX.current;
    if (dx < -60) setOpen(false);
    startX.current = null;
  };

  return (
    <>
      <div className={`sidebar-overlay${open?' show':''}`} onClick={() => setOpen(false)} />
      <aside className={`sidebar${open?' open':''}`} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>

        <div className="sb-logo" onClick={() => { nav(null); setOpen(false); }}>
          <span className="sb-logo-sym">∑</span>
          <span className="sb-logo-name">ВысшМат</span>
          <button className="sb-close" onClick={e => { e.stopPropagation(); setOpen(false); }}>✕</button>
        </div>

        <div className="sb-search">
          <input type="search" placeholder="Поиск темы..." value={q} onChange={e => setQ(e.target.value)} />
          <span className="sb-search-icon">⌕</span>
        </div>

        <nav className="sb-nav">
          <div className={`sb-home${cur===null?' active':''}`} onClick={() => { nav(null); setOpen(false); }}>
            🏠 Главная
          </div>

          {filtered ? (
            filtered.length === 0
              ? <p className="no-results">Ничего не найдено</p>
              : filtered.map(t => (
                <div key={t.id}
                  className={`sb-item${cur===t.id?' active':''}${done.includes(t.id)?' done':''}`}
                  onClick={() => { nav(t.id); setOpen(false); }}>
                  {done.includes(t.id) ? <span className="sb-done-dot">✓</span> : <span className="sb-item-num">{t.id}.</span>}
                  <span className="sb-item-title">{t.title}</span>
                </div>
              ))
          ) : SECTIONS.map(sec => (
            <div key={sec.id} className="sb-section">
              <div className="sb-section-hd" onClick={() => toggle(sec.id)}>
                <span className="sb-sec-icon">{sec.icon}</span>
                <span className="sb-sec-label">{sec.label}</span>
                <span className={`sb-sec-arr${coll[sec.id]?' c':''}`}>▾</span>
                <span className="sb-sec-prog">
                  {sec.topics.filter(id => done.includes(id)).length}/{sec.topics.length}
                </span>
              </div>
              {!coll[sec.id] && (
                <div className="sb-items">
                  {sec.topics.map(tid => {
                    const t = TOPICS.find(x => x.id === tid);
                    if (!t) return null;
                    return (
                      <div key={t.id}
                        className={`sb-item${cur===t.id?' active':''}${done.includes(t.id)?' done':''}`}
                        onClick={() => { nav(t.id); setOpen(false); }}>
                        {done.includes(t.id) ? <span className="sb-done-dot">✓</span> : <span className="sb-item-num">{t.id}.</span>}
                        <span className="sb-item-title">{t.title}</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          ))}
        </nav>

        <div className="sb-footer">
          <div className="sb-prog-label">Прогресс: {done.length} / {TOPICS.length}</div>
          <div className="sb-prog-bar">
            <div className="sb-prog-fill" style={{width:`${(done.length/TOPICS.length)*100}%`}} />
          </div>
        </div>
      </aside>
    </>
  );
}

/* ──────────────────────────────────────
   TopBar
────────────────────────────────────── */
function TopBar({ cur, theme, toggleTheme, done, nav, setOpen }) {
  const TOPICS = window.TOPICS;
  const topic = cur ? TOPICS.find(t => t.id === cur) : null;
  const pct = Math.round((done.length / TOPICS.length) * 100);
  const dash = pct * 0.942;

  return (
    <header className="topbar">
      <div className="topbar-left">
        <button className="menu-btn" onClick={() => setOpen(v => !v)}>☰</button>
        <div className="breadcrumb">
          <span className="bc-home" onClick={() => nav(null)}>Портал</span>
          {topic && <>
            <span className="bc-sep">›</span>
            <span className="bc-topic">{topic.title}</span>
          </>}
        </div>
      </div>
      <div className="topbar-right">
        <div className="ring-wrap">
          <svg viewBox="0 0 36 36" width="34" height="34">
            <circle cx="18" cy="18" r="15" fill="none" strokeWidth="3" className="ring-bg-c" />
            <circle cx="18" cy="18" r="15" fill="none" strokeWidth="3"
              className="ring-fill-c"
              strokeDasharray={`${dash} 94.2`}
              strokeLinecap="round"
              transform="rotate(-90 18 18)" />
          </svg>
          <span className="ring-pct">{pct}%</span>
        </div>
        <button className="icon-btn" onClick={toggleTheme} aria-label="Тема">
          {theme === 'dark' ? '☀️' : '🌙'}
        </button>
      </div>
    </header>
  );
}

/* ──────────────────────────────────────
   Bottom Nav (mobile)
────────────────────────────────────── */
function BottomNav({ cur, nav, done, setOpen }) {
  const TOPICS = window.TOPICS;
  const idx = cur ? TOPICS.findIndex(t => t.id === cur) : -1;
  const prev = idx > 0 ? TOPICS[idx-1] : null;
  const next = idx >= 0 && idx < TOPICS.length-1 ? TOPICS[idx+1] : null;

  return (
    <nav className="bottom-nav">
      {/* Prev */}
      <button className={`bn-item${!prev?' disabled':''}`}
        onClick={() => prev && nav(prev.id)}
        style={{opacity: prev ? 1 : 0.3}}>
        <span className="bn-icon">◀</span>
        <span className="bn-label">Пред.</span>
      </button>

      {/* Home */}
      <button className={`bn-item${cur===null?' active':''}`} onClick={() => nav(null)}>
        <span className="bn-icon">🏠</span>
        <span className="bn-label">Главная</span>
      </button>

      {/* Topics */}
      <button className="bn-item" onClick={() => setOpen(true)}>
        <span className="bn-icon">☰</span>
        <span className="bn-label">Темы</span>
        {done.length > 0 && <span className="bn-badge">{done.length}</span>}
      </button>

      {/* Next */}
      <button className={`bn-item${!next?' disabled':''}`}
        onClick={() => next && nav(next.id)}
        style={{opacity: next ? 1 : 0.3}}>
        <span className="bn-icon">▶</span>
        <span className="bn-label">След.</span>
      </button>
    </nav>
  );
}

/* ──────────────────────────────────────
   Home Page
────────────────────────────────────── */
function HomePage({ nav, done }) {
  const SECTIONS = window.SECTIONS;
  const TOPICS   = window.TOPICS;
  return (
    <div className="fade-up">
      <section className="hero">
        <div className="hero-badge">Университетский курс</div>
        <h1 className="hero-title">Портал<br/><span className="hero-accent">Высшей Математики</span></h1>
        <p className="hero-sub">
          42 темы от пределов до теоремы Гаусса–Остроградского.
          Теория, формулы и разобранные примеры.
        </p>
        <div className="hero-stats">
          <div><span className="stat-num">42</span><span className="stat-label">Темы</span></div>
          <div><span className="stat-num">9</span><span className="stat-label">Разделов</span></div>
          <div><span className="stat-num">84+</span><span className="stat-label">Примеров</span></div>
          <div><span className="stat-num">{done.length}</span><span className="stat-label">Изучено</span></div>
        </div>
        <button className="hero-cta" onClick={() => nav(1)}>Начать изучение →</button>
      </section>

      <div className="home-sec">
        <h2 className="sec-hd">Разделы</h2>
        <div className="sections-grid">
          {SECTIONS.map(sec => {
            const d = sec.topics.filter(id => done.includes(id)).length;
            const pct = Math.round((d / sec.topics.length) * 100);
            return (
              <div key={sec.id} className="sec-card" onClick={() => nav(sec.topics[0])}>
                <div className="sc-icon">{sec.icon}</div>
                <div className="sc-name">{sec.label}</div>
                <div className="sc-cnt">{sec.topics.length} тем</div>
                <div className="sc-bar"><div className="sc-fill" style={{width:`${pct}%`}} /></div>
                <div className="sc-pct">{pct}%</div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="home-sec">
        <h2 className="sec-hd">Все темы</h2>
        <div className="topics-list">
          {TOPICS.map(t => (
            <div key={t.id} className={`topic-row${done.includes(t.id)?' done':''}`} onClick={() => nav(t.id)}>
              <div className="tr-num">{t.id}</div>
              <div className="tr-body">
                <div className="tr-title">{t.title}</div>
                <div className="tr-sub">{t.subtitle}</div>
              </div>
              {done.includes(t.id) && <div className="tr-check">✓</div>}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ──────────────────────────────────────
   Topic Page
────────────────────────────────────── */
function TopicPage({ topicId, nav, done, toggleDone }) {
  const TOPICS = window.TOPICS;
  const idx    = TOPICS.findIndex(t => t.id === topicId);
  const topic  = TOPICS[idx];
  const prev   = TOPICS[idx-1];
  const next   = TOPICS[idx+1];
  const isDone = done.includes(topicId);

  // swipe left/right to navigate
  const touchX = useRef(null);
  const onTS = e => { touchX.current = e.touches[0].clientX; };
  const onTE = e => {
    if (touchX.current === null) return;
    const dx = e.changedTouches[0].clientX - touchX.current;
    if (dx < -80 && next) nav(next.id);
    else if (dx > 80 && prev) nav(prev.id);
    touchX.current = null;
  };

  useEffect(() => { window.scrollTo({top:0,behavior:'smooth'}); }, [topicId]);

  if (!topic) return <div className="err-page">Тема не найдена</div>;

  return (
    <article className="fade-up" onTouchStart={onTS} onTouchEnd={onTE}>
      <header className="topic-hd">
        <div className="topic-meta">
          <span className="topic-num-badge">Тема {topic.id} из 42</span>
          {isDone && <span className="topic-done-pill">✓ Изучено</span>}
        </div>
        <h1 className="topic-title">{topic.title}</h1>
        <p className="topic-subtitle">{topic.subtitle}</p>
      </header>

      {topic.theory?.length > 0 && (
        <Coll title="Теория" icon="📖">
          <div className="theory-stack">
            {topic.theory.map((b,i) => <TBlock key={i} b={b} />)}
          </div>
        </Coll>
      )}

      {topic.formulas?.length > 0 && (
        <Coll title="Формулы" icon="📐">
          <div className="formulas-stack">
            {topic.formulas.map((f,i) => (
              <div key={i} className={`f-card${f.key?' key':''}`}>
                {f.key && <span className="f-key-badge">Ключевая</span>}
                {f.label && <div className="f-label">{f.label}</div>}
                <KM tex={f.formula || f.tex || ''} display />
              </div>
            ))}
          </div>
        </Coll>
      )}

      {topic.keyIdeas?.length > 0 && (
        <Coll title="Ключевые идеи" icon="🧠">
          <div className="ideas-grid">
            {topic.keyIdeas.map((idea,i) => (
              <div key={i} className="idea-card">
                <div className="idea-icon">{idea.icon}</div>
                <div className="idea-title">{idea.title}</div>
                <div className="idea-desc"><RT text={idea.desc} /></div>
              </div>
            ))}
          </div>
        </Coll>
      )}

      {topic.examples?.length > 0 && (
        <Coll title="Примеры" icon="✅">
          <div className="examples-stack">
            {topic.examples.map((ex,i) => <Ex key={i} ex={ex} num={i+1} />)}
          </div>
        </Coll>
      )}

      {topic.warnings?.length > 0 && (
        <Coll title="Типичные ошибки" icon="⚠️">
          <ul className="warn-list">
            {topic.warnings.map((w,i) => (
              <li key={i} className="warn-item">
                <span className="warn-icon">⚠</span>
                <RT text={typeof w==='string'?w:(w.text||String(w))} />
              </li>
            ))}
          </ul>
        </Coll>
      )}

      <div className="topic-actions">
        <button className={`done-btn${isDone?' done':''}`} onClick={() => toggleDone(topicId)}>
          {isDone ? '✓ Изучено' : 'Отметить как изученное'}
        </button>
      </div>

      <nav className="topic-nav">
        <div className="nav-side">
          {prev && (
            <button className="nav-btn" onClick={() => nav(prev.id)}>
              ← Предыдущая
              <span className="nav-btn-label">{prev.title}</span>
            </button>
          )}
        </div>
        <div className="nav-side right">
          {next && (
            <button className="nav-btn" onClick={() => nav(next.id)}>
              Следующая →
              <span className="nav-btn-label">{next.title}</span>
            </button>
          )}
        </div>
      </nav>

      <p className="swipe-hint">← Свайп для навигации →</p>
    </article>
  );
}

/* ──────────────────────────────────────
   APP ROOT
────────────────────────────────────── */
const SK = 'mathportal_done';
const TK = 'mathportal_theme';

function App() {
  const [cur,     setCur]     = useState(null);
  const [theme,   setTheme]   = useState(() => localStorage.getItem(TK) || 'light');
  const [done,    setDone]    = useState(() => { try { return JSON.parse(localStorage.getItem(SK))||[]; } catch { return []; } });
  const [sbOpen,  setSbOpen]  = useState(false);

  // Apply theme
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem(TK, theme);
    // Update theme-color meta for browser chrome
    const meta = document.getElementById('theme-color-meta');
    if (meta) meta.content = theme === 'dark' ? '#13121a' : '#faf8f5';
  }, [theme]);

  // Persist done
  useEffect(() => { localStorage.setItem(SK, JSON.stringify(done)); }, [done]);

  const nav        = useCallback(id => { setCur(id); setSbOpen(false); }, []);
  const toggleTheme = () => setTheme(t => t==='dark'?'light':'dark');
  const toggleDone  = id => setDone(p => p.includes(id) ? p.filter(x=>x!==id) : [...p,id]);

  return (
    <div className="app-root">
      <Sidebar cur={cur} nav={nav} done={done} open={sbOpen} setOpen={setSbOpen} />

      <div className="main-wrapper">
        <TopBar cur={cur} theme={theme} toggleTheme={toggleTheme} done={done} nav={nav} setOpen={setSbOpen} />

        <main className="main-content">
          {cur === null
            ? <HomePage nav={nav} done={done} />
            : <TopicPage topicId={cur} nav={nav} done={done} toggleDone={toggleDone} />
          }
        </main>
      </div>

      <BottomNav cur={cur} nav={nav} done={done} setOpen={setSbOpen} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
